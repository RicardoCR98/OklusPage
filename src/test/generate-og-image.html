<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a1628;
      font-family: 'Manrope', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 100px;
      position: relative;
      overflow: hidden;
    }
    /* Decorative circles */
    .circle-1 {
      position: absolute;
      right: -80px;
      top: -80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,128,118,0.15) 0%, transparent 70%);
    }
    .circle-2 {
      position: absolute;
      right: 120px;
      bottom: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,128,118,0.1) 0%, transparent 70%);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    .logo-text {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .headline {
      font-size: 62px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 24px;
      max-width: 820px;
    }
    .headline span {
      color: #00b5a8;
    }
    .subtext {
      font-size: 24px;
      color: #8899aa;
      font-weight: 400;
      max-width: 700px;
      line-height: 1.4;
    }
    .badge {
      position: absolute;
      bottom: 80px;
      right: 100px;
      background: rgba(0,128,118,0.2);
      border: 1px solid rgba(0,128,118,0.4);
      border-radius: 999px;
      padding: 10px 24px;
      color: #00b5a8;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="circle-1"></div>
    <div class="circle-2"></div>

    <div class="logo-row">
      <svg width="48" height="29" viewBox="0 0 30 18" fill="none" xmlns="http://www.w3.org/2000/svg">

      <span class="logo-text">Oklus</span>
    </div>

    <h1 class="headline">Software dental<br>que <span>sí funciona</span><br>en Ecuador</h1>
    <p class="subtext">Sin internet, sin complicaciones. Gestión de pacientes para clínicas pequeñas.</p>

    <div class="badge">Acceso beta gratuito</div>
  </div>
</body>
</html>
